name: Build Android APK
on:
  push:
    branches: [ main, master ]
jobs:
  build:
    # 切换到 Ubuntu 20.04，这是构建 APK 最稳定的环境
    runs-on: ubuntu-20.04
    
    steps:
      - uses: actions/checkout@v4
      
      # 1. Java 11 (对旧版 SDK 工具兼容性更好)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      # 2. Python 3.8 (最稳妥的版本)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      # 3. 安装依赖 (Buildozer 官方推荐列表)
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip \
            build-essential \
            git \
            python3 \
            python3-dev \
            ffmpeg \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev \
            libgstreamer1.0 \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            libltdl-dev \
            libffi-dev \
            libssl-dev \
            autoconf \
            libtool \
            zip \
            unzip \
            libncurses5 \
            libopenal-dev \
            libtinfo5

      # 4. 安装 Buildozer (指定稳定版本)
      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.21

      # 5. 清理旧构建 (防止缓存干扰)
      - name: Cleanup
        run: |
          rm -rf .buildozer
          rm -rf bin

      # 6. 开始打包
      - name: Build
        run: |
          yes | buildozer -v android debug

      # 7. 上传结果
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk